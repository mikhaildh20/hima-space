name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hima_user
          POSTGRES_PASSWORD: hima_pass
          POSTGRES_DB: hima_space_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://hima_user:***@localhost:5432/hima_space_test?schema=public
          JWT_SECRET=test-jwt-secret-key-min-32-chars
          NODE_ENV=test
          EOF

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run seed
        run: npx prisma db seed

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

  notify:
    needs: [test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send test result notification
        if: always()
        run: |
          STATUS="${{ needs.test.result == 'success' && 'Lulus' || 'Gagal' }}"
          
          MESSAGE="🚀 CI/CD Pipeline - HIMA Space
          
Status: ${STATUS}
Branch: ${{ github.ref_name }}
Commit: ${{ github.sha }}
Author: ${{ github.actor }}
          
Lihat: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "::notice title=CI/CD Notification::${MESSAGE}"

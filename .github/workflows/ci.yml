name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hima_user
          POSTGRES_PASSWORD: hima_pass
          POSTGRES_DB: hima_space_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://hima_user:hima_pass@localhost:5432/hima_space_test?schema=public
          JWT_SECRET=test-secret-for-ci-only-32chars
          NODE_ENV=test
          EOF

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run seed
        run: npx prisma db seed

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Deploy to Staging (via webhook)
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          method: 'POST'
          customHeaders: '{"X-Webhook-Secret": "${{ secrets.WEBHOOK_SECRET }}"}'
          data: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "branch": "${{ github.ref_name }}", "env": "staging"}'

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Deploy to Production (via webhook)
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          method: 'POST'
          customHeaders: '{"X-Webhook-Secret": "${{ secrets.WEBHOOK_SECRET }}"}'
          data: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "branch": "${{ github.ref_name }}", "env": "production"}'

  notify:
    needs: [test, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.TELEGRAM_WEBHOOK_URL }}
          method: 'POST'
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"text": "🚀 HIMA Space CI/CD\nStatus: ${{ needs.test.result == \"success\" && \"✅ Test passed\" || \"❌ Test failed\" }}\nBranch: ${{ github.ref_name }}\nSHA: ${{ github.sha }}\nBy: ${{ github.actor }}"}'
        if: always()
